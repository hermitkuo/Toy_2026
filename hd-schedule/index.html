<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>血透室 醫師班表查詢</title>
<style>
  :root{
    --bg:#f5f7f9; --card:#ffffff; --ink:#1f2933; --muted:#5b6772;
    --line:#e3e8ee; --line2:#eef2f6; --line3:#f1f4f7;
    --accent:#0f766e; --accent-600:#0e6b63; --accent-soft:#d7f0ec;
    --accent-tint:#ecf7f5;
    --today-tint:#e6f4f0; --today-bar:#0f766e;
    --head:#f1f4f7; --head-ink:#3a4a58;
    --ok:#16a34a; --danger:#b42318;
    --hrow:26px; --hsub:28px; --wdate:52px; --wwk:42px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1.3;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:1160px; margin:0 auto; padding:14px 12px 60px;}

  /* ---------- header + status pill ---------- */
  header.top{display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; margin-bottom:12px;}
  header.top h1{font-size:19px; margin:0; font-weight:700; letter-spacing:.3px;}
  .spacer{flex:1 1 auto;}
  button{font-family:inherit; cursor:pointer;}

  .statuspill{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--line);
    border-radius:999px; padding:4px 6px 4px 12px;
  }
  .statuspill .dot{
    width:8px; height:8px; border-radius:50%; background:var(--ok);
    box-shadow:0 0 0 3px rgba(22,163,74,.15); flex:0 0 auto;
  }
  .statuspill.err .dot{background:var(--danger); box-shadow:0 0 0 3px rgba(180,35,24,.15);}
  .statuspill.loading .dot{background:#cbd5df; box-shadow:0 0 0 3px rgba(203,213,223,.25);}
  .statuspill .sub{color:var(--muted); font-size:12.5px; white-space:nowrap;}
  .iconbtn{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:999px; width:28px; height:28px; font-size:15px; line-height:1;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .iconbtn:hover{border-color:var(--accent); color:var(--accent);}
  .iconbtn:active{transform:translateY(1px);}

  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:8px; padding:7px 12px; font-size:13.5px; line-height:1;
  }
  .btn:hover{border-color:var(--accent); color:var(--accent);}
  .btn:active{transform:translateY(1px);}

  /* ---------- month nav + picker ---------- */
  .navbar{display:flex; align-items:center; gap:8px; margin:4px 0 12px;}
  .month-wrap{position:relative; display:flex; align-items:center; gap:8px;}
  .month{
    border:1px solid transparent; background:transparent; color:var(--ink);
    font-size:20px; font-weight:700; min-width:150px; text-align:center;
    border-radius:10px; padding:6px 10px; display:inline-flex; align-items:center;
    justify-content:center; gap:6px;
  }
  .month:hover{background:var(--line3);}
  .month .caret{font-size:12px; color:var(--muted);}
  .nav-btn{
    border:1px solid var(--line); background:var(--card); border-radius:10px;
    width:40px; height:40px; font-size:19px; color:var(--ink); display:flex;
    align-items:center; justify-content:center; flex:0 0 auto;
  }
  .nav-btn:hover{border-color:var(--accent); color:var(--accent);}
  .nav-btn.sm{width:30px; height:30px; font-size:16px; border-radius:8px;}
  .today-btn{border-radius:10px; height:40px;}

  .mpick{
    position:absolute; top:50px; left:44px; z-index:40; width:252px;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    box-shadow:0 12px 32px rgba(20,40,60,.16); padding:10px;
  }
  .mpick .yr{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .mpick .yr b{font-size:15px;}
  .mpick .grid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .mpick .mo{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:8px; padding:9px 0 6px; font-size:13.5px;
  }
  .mpick .mo:hover{border-color:var(--accent); color:var(--accent);}
  .mpick .mo.cur{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}
  .mpick .mo.empty{color:#b3bcc6;}
  .mpick .mo .has-dot{display:block; width:4px; height:4px; border-radius:50%;
    background:var(--accent); margin:3px auto 0;}
  .mpick .mo.cur .has-dot{background:#fff;}

  /* ---------- doctor chips (multi-select) ---------- */
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin:0 0 12px; align-items:center;}
  .chips .lbl{color:var(--muted); font-size:12.5px; margin-right:2px;}
  .chip{
    border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:5px 12px 5px 9px; font-size:14px; color:var(--ink);
    display:inline-flex; align-items:center; gap:6px; line-height:1.15;
  }
  .chip .cdot{width:8px; height:8px; border-radius:50%; flex:0 0 auto;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}
  .chip.on .cdot{background:#fff !important;}
  .chip.clear{color:var(--muted); padding-left:12px;}
  .chip.clear.on{background:var(--accent); color:#fff;}

  /* ---------- table ---------- */
  .tablecard{background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .scroll{overflow:auto; max-height:calc(100vh - 220px);}
  table{border-collapse:separate; border-spacing:0; width:100%; font-size:16px;}
  th,td{padding:5px 9px; text-align:center; white-space:nowrap; border-bottom:1px solid var(--line2);}

  /* two-tier sticky header */
  thead th{position:sticky; z-index:4; background:var(--head); color:var(--head-ink);
    font-weight:700; border-bottom:1px solid var(--line);}
  thead tr.grp th{top:0; height:var(--hrow); font-size:12px; letter-spacing:.4px; padding:2px 8px;}
  thead tr.sub th{top:var(--hrow); height:var(--hsub); font-size:12.5px; padding:3px 8px;
    color:#54636f; font-weight:600; background:#f6f8fa;}
  thead tr.grp th.grouped{background:#e9eef3; color:#33424f;}

  /* group separators */
  .gsep{border-left:1px solid var(--line);}

  /* sticky first two columns: 日期 + 週 */
  th.c-date,td.c-date{position:sticky; left:0; width:var(--wdate); min-width:var(--wdate);
    text-align:left; font-weight:700; padding-left:11px; padding-right:6px;}
  th.c-wk,td.c-wk{position:sticky; left:var(--wdate); width:var(--wwk); min-width:var(--wwk);
    color:var(--muted); font-size:14px; box-shadow:1px 0 0 var(--line);}
  td.c-date,td.c-wk{background:var(--card); z-index:2;}
  thead th.c-date,thead th.c-wk{z-index:6;}
  thead th.c-date,thead th.c-wk{background:var(--head);}

  /* weekend: quiet — only tint frozen cols + colour the weekday text */
  tbody tr.weekend td.c-date,tbody tr.weekend td.c-wk{background:#f7f9fb;}
  tbody tr.sat td.c-wk{color:#2563eb;}
  tbody tr.sun td.c-wk,tbody tr.sun td.c-date{color:var(--danger);}

  /* today: strong brand indicator, distinct from weekend */
  tbody tr.today td{background:var(--today-tint);}
  tbody tr.today td.c-date{background:var(--today-tint); color:var(--accent-600); font-weight:800;
    box-shadow:inset 3px 0 0 var(--today-bar);}
  tbody tr.today td.c-wk{background:var(--today-tint);}

  /* row hover for horizontal scanning */
  tbody tr:hover td{background:#f0f6f5;}
  tbody tr:hover td.c-date,tbody tr:hover td.c-wk{background:#e9f2f0;}
  tbody tr.today:hover td{background:#dcefe9;}

  /* empty slot marker (distinguish "no shift" from missing data) */
  td .dash{color:#c4ccd4; font-weight:400;}

  /* doctor name badges */
  td .nm{
    display:inline-block; margin:1px 2px; padding:1px 8px; border-radius:999px;
    font-size:14.5px; line-height:1.55; white-space:nowrap;
    background:hsl(var(--h),42%,95%); color:hsl(var(--h),36%,33%);
    transition:box-shadow .1s, opacity .1s;
  }
  td .nm.hit{color:#fff; font-weight:700;}  /* background set inline, per-doctor colour */
  td .nm.xh:not(.hit){box-shadow:0 0 0 2px rgba(15,118,110,.45);}
  .scroll.filtering td .nm:not(.hit){opacity:.28;}

  th.c-left,td.c-left{text-align:left;}

  /* ---------- status / error ---------- */
  .status{padding:44px 16px; text-align:center; color:var(--muted);}
  .status.err{color:var(--danger);}
  .status .big{font-size:16px; margin-bottom:10px; color:inherit;}
  .status a{color:var(--accent);}
  .spin{display:inline-block; width:22px; height:22px; border:3px solid var(--accent-soft);
    border-top-color:var(--accent); border-radius:50%; animation:sp .8s linear infinite;
    vertical-align:-5px; margin-right:8px;}
  @keyframes sp{to{transform:rotate(360deg)}}

  footer{color:var(--muted); font-size:12px; text-align:center; margin-top:16px;}
  footer a{color:var(--muted);}

  /* ---------- view switcher (班表 / 找空檔) ---------- */
  .viewtabs{display:inline-flex; background:var(--head); border:1px solid var(--line);
    border-radius:10px; padding:3px; gap:3px; margin:0 0 12px;}
  .vtab{border:0; background:transparent; color:var(--muted); font-size:14px; font-weight:600;
    padding:7px 14px; border-radius:8px; line-height:1; display:inline-flex; align-items:center; gap:6px;}
  .vtab:hover{color:var(--accent);}
  .vtab.on{background:var(--card); color:var(--accent); box-shadow:0 1px 2px rgba(20,40,60,.08);}

  /* ---------- availability view ---------- */
  .av-bar{display:flex; flex-wrap:wrap; align-items:center; gap:8px 10px; margin:0 0 10px;}
  .av-month{font-size:19px; font-weight:700; margin-right:4px;}
  .wkpills{display:inline-flex; flex-wrap:wrap; gap:6px;}
  .wkpill{border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 13px; font-size:13.5px; color:var(--ink); line-height:1.15; text-align:center;}
  .wkpill small{display:block; color:var(--muted); font-size:11px; font-weight:400; margin-top:1px;}
  .wkpill:hover{border-color:var(--accent); color:var(--accent);}
  .wkpill.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}
  .wkpill.on small{color:rgba(255,255,255,.85);}
  .av-actions{margin-left:auto; display:flex; gap:6px;}

  /* availability table */
  table.avtbl{border-collapse:separate; border-spacing:0; width:auto; table-layout:fixed; font-size:15px;}
  .avtbl th,.avtbl td{padding:5px 8px; text-align:center; white-space:nowrap;
    border-bottom:1px solid var(--line2);}
  .avtbl thead th{position:sticky; z-index:4; background:var(--head); color:var(--head-ink);
    font-weight:700; border-bottom:1px solid var(--line);}
  .avtbl thead tr.grp th{top:0; height:26px; font-size:12px; padding:2px 8px;}
  .avtbl thead tr.grp th.wd{background:#e9eef3; color:#33424f;}
  .avtbl thead tr.grp th.wd.we{color:var(--danger);}
  .avtbl thead tr.grp th.wd small{font-weight:400; color:var(--muted); font-size:10.5px; margin-left:3px;}
  .avtbl thead tr.sub th{top:26px; height:26px; font-size:12px; padding:3px 6px;
    color:#54636f; font-weight:600; background:#f6f8fa;}
  .avtbl th.c-site,.avtbl td.c-site{position:sticky; left:0; z-index:2; text-align:left;
    font-weight:700; padding-left:11px; min-width:74px; background:var(--card);
    box-shadow:1px 0 0 var(--line);}
  .avtbl thead th.c-site{z-index:6; background:var(--head);}
  /* 早/中/晚 columns: fixed ~3-doctor width, wrap beyond; thin line between sessions */
  .avtbl th.sc,.avtbl td.sc{border-left:1px solid #c2cdd8;}
  .avtbl td.sc{white-space:normal;}
  .avtbl td.fdcell{white-space:normal;}
  /* weekday separators: prominent line between 週一|週二|… (overrides the thin one on 早) */
  .avtbl td.gsep,.avtbl th.gsep{border-left:2px solid #bcc8d4;}
  .avtbl thead tr.grp th.wd.gsep{border-left:2px solid #a9b7c6;}
  /* de-emphasise 晚 columns (no evening OPD clinic) */
  .avtbl td.late{background:#f4f6f8!important;}
  .avtbl th.late{background:#eef1f4!important; color:#a9b1ba; font-weight:600;}
  .avtbl td.late .nm{opacity:.38;}
  .avtbl td.late .dash{color:#dde3e9;}
  .avtbl td.late .allfree{color:#c6ced6;}
  .avtbl tbody tr:hover td{background:#f0f6f5;}
  .avtbl tbody tr:hover td.c-site{background:#e9f2f0;}

  /* site rows vs computed availability rows */
  .avtbl tr.siterow td.c-site{color:var(--ink);}
  .avtbl tr.freerow td{background:var(--accent-tint);}
  .avtbl tr.freerow td.c-site{background:var(--accent-soft); color:var(--accent-600);}
  .avtbl tr.freerow:hover td{background:#e2f2ef;}
  .avtbl tr.fulldayrow td{background:#eef6ff;}
  .avtbl tr.fulldayrow td.c-site{background:#dcebff; color:#1e5aa8;}
  .avtbl tr.fulldayrow:hover td{background:#e3effb;}
  .avtbl tr.sep-top td{border-top:2px solid var(--line);}

  .avtbl td .nm{display:inline-block; margin:1px 2px; padding:1px 7px; border-radius:999px;
    font-size:14px; line-height:1.5; background:hsl(var(--h),42%,95%); color:hsl(var(--h),36%,33%);}
  .avtbl td .nm.free{background:#dff3ee; color:#0d6b60;}
  .avtbl td .nm.hit{color:#fff!important; font-weight:700;}  /* background set inline, per-doctor colour */
  .avtbl.filtering td .nm:not(.hit){opacity:.26;}
  .avtbl td .dash{color:#c9d0d8;}
  .avtbl td.xcell{color:#c0c8d0; font-size:12.5px;}
  .avtbl td.allfree{color:#93b7a9; font-size:12px; font-style:italic;}

  .av-hint{color:var(--muted); font-size:12.5px; margin:10px 2px 0; line-height:1.5;}
  .av-hint b{color:var(--accent-600);}

  @media (max-width:560px){
    body{font-size:15px;}
    header.top h1{font-size:16px;}
    .month{font-size:18px; min-width:120px;}
    table{font-size:15.5px;}
    th,td{padding:5px 7px;}
    td .nm{font-size:14px; padding:1px 7px;}
    .mpick{left:8px;}
    .avtbl{font-size:14px;}
    .avtbl th,.avtbl td{padding:5px 6px;}
    .avtbl td .nm{font-size:13px; padding:1px 6px;}
    .av-actions{margin-left:0; width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>花蓮慈院 · 血液透析室 醫師班表</h1>
    <div class="spacer"></div>
    <div class="statuspill loading" id="statusPill">
      <span class="dot"></span>
      <span class="sub" id="loadInfo">載入中…</span>
      <button class="iconbtn" id="refreshBtn" title="重新抓取最新班表" aria-label="重新整理">↻</button>
    </div>
  </header>

  <div class="viewtabs" role="tablist">
    <button class="vtab on" id="tabDate" data-view="date" role="tab" aria-selected="true">📅 班表</button>
    <button class="vtab" id="tabAvail" data-view="avail" role="tab" aria-selected="false">🔎 找空檔</button>
  </div>

  <section id="viewDate">
  <div class="navbar">
    <div class="month-wrap">
      <button class="nav-btn" id="prevBtn" aria-label="上個月">‹</button>
      <button class="month" id="monthLabel" aria-haspopup="true" aria-expanded="false">
        —<span class="caret">▾</span>
      </button>
      <button class="nav-btn" id="nextBtn" aria-label="下個月">›</button>
      <div class="mpick" id="mpick" hidden></div>
    </div>
    <button class="btn today-btn" id="thisMonthBtn">本月</button>
  </div>

  <div class="chips" id="chips" hidden>
    <span class="lbl">高亮醫師（可多選）：</span>
  </div>

  <div class="tablecard">
    <div class="scroll" id="scroll">
      <div class="status" id="status"><span class="spin"></span>正在載入班表…</div>
    </div>
  </div>
  </section>

  <section id="viewAvail" hidden>
    <div class="av-bar">
      <span class="av-month" id="avMonth">—</span>
      <div class="wkpills" id="avWeeks"></div>
      <div class="av-actions">
        <button class="btn" id="avJson">⬇︎ JSON</button>
        <button class="btn" id="avCsv">⬇︎ CSV</button>
      </div>
    </div>

    <div class="chips" id="avChips" hidden>
      <span class="lbl">高亮醫師（可多選）：</span>
    </div>

    <div class="tablecard">
      <div class="scroll" id="avScroll">
        <div class="status"><span class="spin"></span>正在載入輪值母表…</div>
      </div>
    </div>

    <div class="av-hint">
      綠列 <b>有空</b>＝該時段沒被任何院區排到的醫師；藍列 <b>全天有空</b>＝當天早/中/晚都沒班的醫師。
      已扣除當日<b>休假</b>醫師（依班表分頁的休假欄）。名單依當月母表出現的醫師自動推得；資料即時同步。
    </div>
  </section>

  <footer>
    資料即時同步自
    <a id="sheetLink" href="#" target="_blank" rel="noopener">Google 試算表</a>
    · 名字為醫師簡稱 · 滑過任一醫師可跨列高亮同名班
  </footer>
</div>

<script>
// ---- shared status-pill controller (both views write here; only active view shows) ----
window.__hdPill = {
  view: "date",
  last: { date:["loading","載入中…"], avail:["loading","載入中…"] },
  refresh: { date:null, avail:null },
  set: function(view, state, text){
    this.last[view] = [state, text];
    if (view === this.view) this._apply(state, text);
  },
  show: function(view){
    this.view = view;
    var l = this.last[view] || ["ok",""];
    this._apply(l[0], l[1]);
  },
  _apply: function(state, text){
    var pill = document.getElementById("statusPill");
    pill.className = "statuspill" + (state==="ok" ? "" : " "+state);
    document.getElementById("loadInfo").textContent = text;
  }
};

// ---- highlight palette: a distinct, muted colour per selected doctor, assigned by selection order ----
window.__HL_PALETTE = ["#4b7168","#9c6249","#566d94","#97596f","#736394","#5c7d55","#4d7a82","#8a6f42"];
window.__hlColorFor = function(orderedNames, name){
  var i = orderedNames.indexOf(name);
  return i === -1 ? null : window.__HL_PALETTE[i % window.__HL_PALETTE.length];
};
</script>
<script>

    {i:4,  name:"中",     group:"院內時段"},

    {i:6,  name:"花蓮HD", group:null},
    {i:7,  name:"特約",   group:null},
    {i:8,  name:"玉里",   group:"外派特約"},
    {i:9,  name:"關山",   group:"外派特約"},
    {i:10, name:"聯安",   group:"外派特約"},
    {i:11, name:"聯安掛名",group:"外派特約"},
    {merge:[14,15,16,17], name:"休假", group:"假勤", left:true}
  ];

  // fixed display order for the doctor highlight chips
  var PREF_ORDER = ["徐","王","賴","林","郭","超","鄧","翔","祺","禮"];

  var el = function(id){ return document.getElementById(id); };
  var scrollEl = el("scroll");
  var chipsEl  = el("chips");
  var pillEl   = el("statusPill");

  var allRows = [];        // {date:Date, wk:string, cells:[strings]}
  var byMonth = {};        // "YYYY-M" -> [rowIndexes]
  var roster = [];         // doctor names (sorted for display)
  var view = null;         // {y, m}  m: 0-based
  var activeNames = {};    // set of highlighted doctors {name:true}
  var sections = buildSections();   // header grouping, precomputed once
  var secStart = sectionStartSet(); // shift-col indexes that begin a section

  el("sheetLink").href = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/edit?gid="+GID;

  // ---- data load via gviz JSONP (no CORS) ----
  var CB = "__sched_cb__";
  var curScript = null, loadTimer = null;

  function load(){
    setPill("loading", "載入中…");
    showStatus('<span class="spin"></span>正在載入班表…', false);
    if (curScript && curScript.parentNode) curScript.parentNode.removeChild(curScript);
    clearTimeout(loadTimer);
    var url = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq"
            + "?gid="+GID+"&tqx=responseHandler:"+CB+"&_="+Date.now();
    curScript = document.createElement("script");
    curScript.src = url;
    curScript.onerror = function(){ onError("無法連線到 Google 試算表。請檢查網路連線。"); };
    document.head.appendChild(curScript);
    loadTimer = setTimeout(function(){ onError("載入逾時，請稍後重試。"); }, 15000);
  }

  window[CB] = function(resp){
    clearTimeout(loadTimer);
    try {
      if (!resp || !resp.table || resp.status === "error") {
        var msg = (resp && resp.errors && resp.errors[0] && resp.errors[0].detailed_message)
                  || "試算表無法讀取，可能已改為非公開。";
        onError(msg); return;
      }
      parse(resp.table);
      buildRoster();
      buildLeaveMap();
      restoreSel();
      renderChips();
      if (!view) view = defaultView();
      render();
      setPill("ok", "已同步 · " + fmtClock(new Date()));
    } catch(e){
      onError("解析班表時發生錯誤：" + (e && e.message ? e.message : e));
    }
  };

  function parse(table){
    allRows = []; byMonth = {};
    var rows = table.rows || [];
    for (var r=0; r<rows.length; r++){
      var c = rows[r].c || [];
      var d = parseDate(c[0]);
      if (!d) continue;
      var wk = valOf(c[1]);
      var cells = [];
      for (var s=0; s<SHIFT_COLS.length; s++){
        var col = SHIFT_COLS[s];
        if (col.merge){
          var parts = [];
          for (var k=0; k<col.merge.length; k++){
            var v = valOf(c[col.merge[k]]);
            if (v) parts.push(v);
          }
          cells.push(parts.join("、"));
        } else {
          cells.push(valOf(c[col.i]) || "");
        }
      }
      var idx = allRows.length;
      allRows.push({date:d, wk:wk, cells:cells});
      var key = d.getFullYear()+"-"+d.getMonth();
      (byMonth[key] = byMonth[key] || []).push(idx);
    }
  }

  function valOf(cell){
    if (cell == null) return "";
    var v = cell.v;
    if (v == null) return "";
    return String(v).trim();
  }

  // gviz date cell: v === "Date(2026,6,1)"
  function parseDate(cell){
    if (!cell) return null;
    var v = cell.v;
    if (v instanceof Date) return v;
    if (typeof v === "string"){
      var m = v.match(/^Date\((\d+),(\d+),(\d+)/);
      if (m) return new Date(+m[1], +m[2], +m[3]);
    }
    return null;
  }

  // ---- header sections (two-tier grouping) ----
  function buildSections(){
    var secs = [], i = 0;
    while (i < SHIFT_COLS.length){
      var col = SHIFT_COLS[i];
      if (col.group){
        var grp = [col], j = i+1;
        while (j < SHIFT_COLS.length && SHIFT_COLS[j].group === col.group){ grp.push(SHIFT_COLS[j]); j++; }
        secs.push({group:col.group, cols:grp, start:i}); i = j;
      } else {
        secs.push({group:null, cols:[col], start:i}); i++;
      }
    }
    return secs;
  }
  function sectionStartSet(){
    var set = {};
    for (var s=0; s<sections.length; s++) set[sections[s].start] = true;
    return set;
  }

  // ---- doctor roster ----
  // Derive the chip list only from physician shift columns (cells index 0..7:
  // 值班/早/中/晚/花蓮HD/特約/玉里/關山). Highlighting still matches every cell.
  var ROSTER_SRC = [0,1,2,3,4,5,6,7];
  var BLACKLIST = {"X":1,"x":1,"?":1,"？":1,"-":1,"－":1,"—":1,"─":1};

  function buildRoster(){
    var singles = {}, multi = {}, seen = {};
    forEachName(function(tok){ if (tok.length === 1) singles[tok] = true; });
    forEachName(function(tok){
      if (seen[tok]) return; seen[tok] = true;
      if (tok.length === 1) return;
      var allKnown = true;
      for (var i=0;i<tok.length;i++){ if(!singles[tok[i]]){ allKnown=false; break; } }
      if (!allKnown) multi[tok] = true;
    });
    var list = Object.keys(singles).concat(Object.keys(multi));
    var freq = {};
    forEachName(function(tok){ freq[tok] = (freq[tok]||0)+1; });
    function rank(n){ var i = PREF_ORDER.indexOf(n); return i === -1 ? 999 : i; }
    list.sort(function(a,b){
      var ra = rank(a), rb = rank(b);
      if (ra !== rb) return ra - rb;
      return (freq[b]||0)-(freq[a]||0) || a.localeCompare(b,"zh-Hant");
    });
    roster = list;
  }

  function forEachName(fn){
    for (var r=0; r<allRows.length; r++){
      var cells = allRows[r].cells;
      for (var s=0; s<ROSTER_SRC.length; s++){
        var raw = cells[ROSTER_SRC[s]];
        if (!raw) continue;
        var toks = raw.split(/[、,\/\s]+/);
        for (var t=0; t<toks.length; t++){
          var tok = toks[t].trim();
          if (tok && !BLACKLIST[tok]) fn(tok);
        }
      }
    }
  }

  // ---- expose leave-by-date (休假 column) for the availability view ----
  function buildLeaveMap(){
    var m = {}, LI = SHIFT_COLS.length - 1;   // last cell = 休假 (merged 假1..4)
    for (var r=0; r<allRows.length; r++){
      var v = allRows[r].cells[LI]; if (!v) continue;
      var d = allRows[r].date, key = d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();
      var toks = v.split(/[、,\/\s]+/), out = [];
      for (var i=0;i<toks.length;i++){ var t=toks[i].trim(); if (t && !BLACKLIST[t]) out.push(t); }
      if (out.length) m[key] = out;
    }
    window.__leaveByDate = m;
    if (window.__availOnData) window.__availOnData();   // let avail view refresh if it's open
  }

  // ---- selection persistence (acts as "my favourites") ----
  function selList(){ return Object.keys(activeNames); }
  function saveSel(){ try{ localStorage.setItem("hd_sel", JSON.stringify(selList())); }catch(e){} }
  function restoreSel(){
    activeNames = {};
    try{
      var a = JSON.parse(localStorage.getItem("hd_sel") || "[]");
      for (var i=0;i<a.length;i++){ if (roster.indexOf(a[i]) !== -1) activeNames[a[i]] = true; }
    }catch(e){ activeNames = {}; }
  }

  // ---- chips ----
  function renderChips(){
    var kids = chipsEl.querySelectorAll(".chip");
    for (var i=0;i<kids.length;i++) kids[i].parentNode.removeChild(kids[i]);
    var clear = mkChip("全部", null, true);
    clear.classList.add("clear");
    chipsEl.appendChild(clear);
    for (var j=0;j<roster.length;j++) chipsEl.appendChild(mkChip(roster[j], roster[j], false));
    chipsEl.hidden = false;
    syncChips();
  }

  function mkChip(text, name, noDot){
    var b = document.createElement("button");
    b.className = "chip"; b.dataset.name = name || "";
    if (!noDot){
      var dot = document.createElement("i");
      dot.className = "cdot";
      dot.style.background = "hsl("+hue(name)+",50%,52%)";
      b.appendChild(dot);
    }
    b.appendChild(document.createTextNode(text));
    b.onclick = function(){
      if (!name){ activeNames = {}; }
      else if (activeNames[name]){ delete activeNames[name]; }
      else { activeNames[name] = true; }
      saveSel(); syncChips(); applyHighlight();
    };
    return b;
  }

  function syncChips(){
    var chips = chipsEl.querySelectorAll(".chip");
    var act = selList(), none = act.length === 0;
    for (var i=0;i<chips.length;i++){
      var nm = chips[i].dataset.name;
      var on = nm ? !!activeNames[nm] : none;
      chips[i].classList.toggle("on", on);
      if (nm && on){ var c = window.__hlColorFor(act, nm);
        chips[i].style.background = c; chips[i].style.borderColor = c; chips[i].style.color = "#fff"; }
      else { chips[i].style.background = ""; chips[i].style.borderColor = ""; chips[i].style.color = ""; }
    }
  }

  // ---- rendering ----
  function defaultView(){
    var now = new Date();
    var key = now.getFullYear()+"-"+now.getMonth();
    if (byMonth[key]) return {y:now.getFullYear(), m:now.getMonth()};
    var keys = Object.keys(byMonth);
    if (keys.length){
      keys.sort(function(a,b){ var A=a.split("-"),B=b.split("-"); return A[0]-B[0] || A[1]-B[1]; });
      var f = keys[0].split("-"); return {y:+f[0], m:+f[1]};
    }
    return {y:now.getFullYear(), m:now.getMonth()};
  }

  function headerHTML(){
    var top = '<tr class="grp"><th class="c-date" rowspan="2">日期</th>'
            + '<th class="c-wk" rowspan="2">週</th>';
    var sub = '<tr class="sub">';
    for (var s=0; s<sections.length; s++){
      var sec = sections[s];
      if (sec.group && sec.cols.length > 1){
        top += '<th class="gsep grouped" colspan="'+sec.cols.length+'">'+esc(sec.group)+'</th>';
        for (var k=0;k<sec.cols.length;k++){
          sub += '<th'+(k===0?' class="gsep"':'')+'>'+esc(sec.cols[k].name)+'</th>';
        }
      } else {
        // standalone column, or single-column group -> show group label if present
        var nm = sec.group ? sec.group : sec.cols[0].name;
        top += '<th class="gsep" rowspan="2">'+esc(nm)+'</th>';
      }
    }
    return top + '</tr>' + sub + '</tr>';
  }

  function render(){
    el("monthLabel").innerHTML = view.y + "年" + (view.m+1) + "月<span class=\"caret\">▾</span>";
    var key = view.y+"-"+view.m;
    var idxs = byMonth[key] || [];
    if (!idxs.length){
      scrollEl.innerHTML = '<div class="status">此月份沒有班表資料。</div>';
      return;
    }
    var today = new Date();
    var todayKey = today.getFullYear()+"|"+today.getMonth()+"|"+today.getDate();

    var h = '<table><thead>' + headerHTML() + '</thead><tbody>';

    for (var i=0;i<idxs.length;i++){
      var row = allRows[idxs[i]];
      var d = row.date;
      var dow = d.getDay();
      var isToday = (d.getFullYear()+"|"+d.getMonth()+"|"+d.getDate()) === todayKey;
      var cls = [];
      if (dow === 0 || dow === 6) cls.push("weekend");
      if (dow === 6) cls.push("sat");
      if (dow === 0) cls.push("sun");
      if (isToday) cls.push("today");
      h += '<tr class="'+cls.join(" ")+'">';
      h += '<td class="c-date">'+(d.getMonth()+1)+'/'+d.getDate()+'</td>';
      h += '<td class="c-wk">'+esc(row.wk || wkName(dow))+'</td>';
      for (var s2=0;s2<SHIFT_COLS.length;s2++){
        var v = row.cells[s2] || "";
        h += '<td'+cellClass(s2)+'>'+renderCell(v)+'</td>';
      }
      h += '</tr>';
    }
    h += '</tbody></table>';
    scrollEl.innerHTML = h;
    applyHighlight();

    var tr = scrollEl.querySelector("tr.today");
    if (tr) tr.scrollIntoView({block:"nearest"});
  }

  function cellClass(s){
    var c = [];
    if (secStart[s]) c.push("gsep");
    if (SHIFT_COLS[s].left) c.push("c-left");
    return c.length ? ' class="'+c.join(" ")+'"' : "";
  }

  // hash a name to a stable hue for its badge colour
  function hue(s){
    var h = 0, str = s || "";
    for (var i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
    return h % 360;
  }

  // wrap each name token in a badge so highlight/cross-highlight can target it
  function renderCell(v){
    if (!v) return '<span class="dash">·</span>';
    var toks = v.split(/[、,\s]+/);
    var out = "";
    for (var i=0;i<toks.length;i++){
      var t = toks[i].trim();
      if (!t) continue;
      out += '<span class="nm" data-nm="'+esc(t)+'" style="--h:'+hue(t)+'">'+esc(t)+'</span>';
    }
    return out || '<span class="dash">·</span>';
  }

  function applyHighlight(){
    var act = selList();
    scrollEl.classList.toggle("filtering", act.length > 0);
    var spans = scrollEl.querySelectorAll(".nm");
    for (var i=0;i<spans.length;i++){
      var nm = spans[i].getAttribute("data-nm") || "";
      var matched = null;
      for (var a=0;a<act.length;a++){ if (nm.indexOf(act[a]) !== -1){ matched = act[a]; break; } }
      if (matched){ spans[i].classList.add("hit"); spans[i].style.background = window.__hlColorFor(act, matched); }
      else { spans[i].classList.remove("hit"); spans[i].style.background = ""; }
    }
  }

  // ---- cross-highlight on hover (same doctor across the whole month) ----
  var xhOn = "";
  function setXH(nm){
    if (nm === xhOn) return;
    clearXH();
    xhOn = nm || "";
    if (!xhOn) return;
    var spans = scrollEl.querySelectorAll(".nm");
    for (var i=0;i<spans.length;i++){
      var v = spans[i].getAttribute("data-nm") || "";
      if (v.indexOf(xhOn) !== -1 || xhOn.indexOf(v) !== -1) spans[i].classList.add("xh");
    }
  }
  function clearXH(){
    if (!xhOn) return;
    var spans = scrollEl.querySelectorAll(".nm.xh");
    for (var i=0;i<spans.length;i++) spans[i].classList.remove("xh");
    xhOn = "";
  }
  scrollEl.addEventListener("mouseover", function(e){
    var t = e.target && e.target.closest ? e.target.closest(".nm") : null;
    if (t) setXH(t.getAttribute("data-nm"));
  });
  scrollEl.addEventListener("mouseleave", clearXH);

  // ---- month picker ----
  var pickYear = null;
  function openPick(){
    if (!view) return;
    pickYear = view.y;
    drawPick();
    el("mpick").hidden = false;
    el("monthLabel").setAttribute("aria-expanded","true");
  }
  function closePick(){
    el("mpick").hidden = true;
    el("monthLabel").setAttribute("aria-expanded","false");
  }
  function drawPick(){
    var html = '<div class="yr">'
      + '<button class="nav-btn sm" data-py="-1" aria-label="前一年">‹</button>'
      + '<b>'+pickYear+' 年</b>'
      + '<button class="nav-btn sm" data-py="1" aria-label="後一年">›</button></div>'
      + '<div class="grid">';
    for (var m=0;m<12;m++){
      var key = pickYear+"-"+m;
      var has = !!byMonth[key];
      var cls = "mo" + (has ? "" : " empty")
              + (view.y===pickYear && view.m===m ? " cur" : "");
      html += '<button class="'+cls+'" data-m="'+m+'">'+(m+1)+'月'
            + (has ? '<span class="has-dot"></span>' : '')+'</button>';
    }
    el("mpick").innerHTML = html + '</div>';
  }
  el("mpick").addEventListener("click", function(e){
    var t = e.target && e.target.closest ? e.target.closest("button") : null;
    if (!t) return;
    if (t.dataset.py){ pickYear += (+t.dataset.py); drawPick(); return; }
    if (t.dataset.m != null){ view = {y:pickYear, m:+t.dataset.m}; closePick(); render(); }
  });
  el("monthLabel").onclick = function(e){
    e.stopPropagation();
    if (el("mpick").hidden) openPick(); else closePick();
  };
  document.addEventListener("click", function(e){
    if (el("mpick").hidden) return;
    if (!e.target.closest || !e.target.closest(".month-wrap")) closePick();
  });

  // ---- helpers ----
  function wkName(dow){ return "週"+["日","一","二","三","四","五","六"][dow]; }
  function fmtClock(d){
    function p(n){ return (n<10?"0":"")+n; }
    return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes());
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function setPill(state, text){
    window.__hdPill.set("date", state, text);
  }
  function showStatus(html, isErr){
    scrollEl.innerHTML = '<div class="status'+(isErr?" err":"")+'">'+html+'</div>';
  }
  function onError(msg){
    clearTimeout(loadTimer);
    setPill("err", "載入失敗");
    chipsEl.hidden = true;
    showStatus('<div class="big">⚠ 無法載入班表</div><div>'+esc(msg)+'</div>'
      +'<div style="margin-top:14px"><button class="btn" id="retryBtn">重試</button> '
      +'<a class="btn" style="text-decoration:none" href="'+el("sheetLink").href+'" target="_blank" rel="noopener">開啟試算表</a></div>', true);
    var rb = el("retryBtn"); if (rb) rb.onclick = load;
  }

  function shiftMonth(delta){
    if (!view) return;
    var m = view.m + delta, y = view.y;
    while (m < 0){ m += 12; y--; }
    while (m > 11){ m -= 12; y++; }
    view = {y:y, m:m};
    render();
  }

  // ---- events ----
  el("prevBtn").onclick = function(){ shiftMonth(-1); };
  el("nextBtn").onclick = function(){ shiftMonth(1); };
  el("thisMonthBtn").onclick = function(){ view = defaultView(); render(); };
  window.__hdPill.refresh.date = load;   // header ↻ routes here when 班表 active

  load();
})();
</script>

<script>
// ===== 找空檔（輪值母表）module ====================================
(function(){
  "use strict";
  var SHEET_ID = "1GI6xVjN7T4KBYP_SXbF-QXohRyPDhIb3k-0QxnLfzFk";

  var CB  = "__avail_cb__";
  var PREF_ORDER = ["徐","王","賴","林","郭","超","鄧","翔","祺","禮"];
  var OUT_ROWS = {"有空":1,"全天有空":1};  // computed rows in the sheet — ignore as source
  var BLACK = {"X":1,"Ｘ":1,"x":1,"?":1,"？":1,"-":1,"－":1,"—":1,"─":1,"":1};
  var WD = ["一","二","三","四","五","六"];
  var SESS = ["早","中","晚"];

  var el = function(id){ return document.getElementById(id); };
  var scrollEl = el("avScroll"), chipsEl = el("avChips");

  var year=null, m0=null, monthTitle="";
  var weekList=[];               // sorted week numbers present
  var byWeek={};                 // wk -> site -> [6][3] -> [names]
  var siteOrder=[];              // real sites, first-seen order

  function load(){

    var url = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq"

  window[CB] = function(resp){

    }catch(e){
      onError("解析母表時發生錯誤："+(e&&e.message?e.message:e));
    }
  };

  function valOf(c){ return (c&&c.v!=null) ? String(c.v).trim() : ""; }
  function tok(s){
    var out=[], parts=(s||"").split(/[、,\/\s]+/);
    for (var i=0;i<parts.length;i++){ var t=parts[i].trim(); if (t && !BLACK[t]) out.push(t); }
    return out;
  }

  function parse(table){
    var rows = table.rows||[];
    // header row 0: "2026/07" in col0
    var mh = valOf(rows[0] && rows[0].c && rows[0].c[0]).match(/(\d{4})\D+(\d{1,2})/);
    if (mh){ year=+mh[1]; m0=(+mh[2])-1; monthTitle=year+"年"+(+mh[2])+"月"; }
    else { monthTitle="輪值母表"; }

    byWeek={}; siteOrder=[]; var seenSite={}; var freq={}; var rosterSet={};
    for (var r=2; r<rows.length; r++){

        if (!seenSite[site]){ seenSite[site]=1; siteOrder.push(site); }
        byWeek[wk] = byWeek[wk] || {};
        var grid = byWeek[wk][site] = byWeek[wk][site] || mkGrid();
        var slot = grid[d][s];
        for (var k=0;k<names.length;k++){

        }

    // roster: PREF order first, then by frequency, then locale
    var list = Object.keys(rosterSet);
    function rank(n){ var i=PREF_ORDER.indexOf(n); return i===-1?999:i; }
    list.sort(function(a,b){
      var ra=rank(a), rb=rank(b);
      if (ra!==rb) return ra-rb;
      return (freq[b]||0)-(freq[a]||0) || a.localeCompare(b,"zh-Hant");
    });
    roster=list;
  }
  function mkGrid(){ var g=[]; for (var d=0;d<6;d++){ g.push([[],[],[]]); } return g; }

  // ---- availability computation ----
  function assigned(wk,d,s){
    var set={};
    for (var i=0;i<siteOrder.length;i++){
      var g = byWeek[wk] && byWeek[wk][siteOrder[i]];
      if (!g) continue;
      var arr=g[d][s]; for (var k=0;k<arr.length;k++) set[arr[k]]=1;
    }
    return set;
  }
  // doctors on leave (休假) that day, from the date-view tab (Tab A), keyed by real date
  function leaveOn(wk,d){
    var dt=slotDate(wk,d), key=dt.getFullYear()+"-"+dt.getMonth()+"-"+dt.getDate();
    return (window.__leaveByDate && window.__leaveByDate[key]) || [];
  }
  function availCount(wk,d){ return roster.length - leaveOn(wk,d).length; }
  function freeAt(wk,d,s){ var a=assigned(wk,d,s), lv=leaveOn(wk,d);
    return roster.filter(function(n){return !a[n] && lv.indexOf(n)===-1;}); }
  function freeAllDay(wk,d){
    var a={}; for (var s=0;s<3;s++){ var x=assigned(wk,d,s); for (var n in x) a[n]=1; }
    var lv=leaveOn(wk,d);
    return roster.filter(function(n){return !a[n] && lv.indexOf(n)===-1;});
  }

  // ---- week helpers (Week 1 = week containing the 1st, Mon-based) ----
  function weekMonday(wk){
    var first=new Date(year, m0, 1);
    var dow=(first.getDay()+6)%7;
    return new Date(year, m0, 1 - dow + (wk-1)*7);
  }
  function slotDate(wk,d){ var mon=weekMonday(wk); var x=new Date(mon); x.setDate(mon.getDate()+d); return x; }
  function md(x){ return (x.getMonth()+1)+"/"+x.getDate(); }
  function iso(x){ function p(n){return (n<10?"0":"")+n;} return x.getFullYear()+"-"+p(x.getMonth()+1)+"-"+p(x.getDate()); }

  // ---- week pills ----
  function renderWeeks(){
    el("avMonth").textContent = monthTitle;
    var h="";
    for (var i=0;i<weekList.length;i++){
      var wk=weekList[i];
      var a=slotDate(wk,0), b=slotDate(wk,5);
      h += '<button class="wkpill'+(wk===curWeek?" on":"")+'" data-wk="'+wk+'">第'+wk+'週'
         + '<small>'+md(a)+'–'+md(b)+'</small></button>';
    }
    el("avWeeks").innerHTML=h;
  }
  el("avWeeks").addEventListener("click", function(e){
    var t=e.target && e.target.closest ? e.target.closest(".wkpill") : null;
    if (!t) return;
    curWeek=+t.dataset.wk; renderWeeks(); render();
  });

  // ---- chips ----
  function selList(){ return Object.keys(activeA); }
  function saveSel(){ try{ localStorage.setItem("hd_sel_a", JSON.stringify(selList())); }catch(e){} }
  function restoreSel(){
    activeA={};
    try{ var a=JSON.parse(localStorage.getItem("hd_sel_a")||"[]");
      for (var i=0;i<a.length;i++){ if (roster.indexOf(a[i])!==-1) activeA[a[i]]=true; }
    }catch(e){ activeA={}; }
  }
  function renderChips(){
    var kids=chipsEl.querySelectorAll(".chip");
    for (var i=0;i<kids.length;i++) kids[i].parentNode.removeChild(kids[i]);
    var clear=mkChip("全部",null,true); clear.classList.add("clear"); chipsEl.appendChild(clear);
    for (var j=0;j<roster.length;j++) chipsEl.appendChild(mkChip(roster[j],roster[j],false));
    chipsEl.hidden=false; syncChips();
  }
  function mkChip(text,name,noDot){
    var b=document.createElement("button");
    b.className="chip"; b.dataset.name=name||"";
    if (!noDot){ var dot=document.createElement("i"); dot.className="cdot";
      dot.style.background="hsl("+hue(name)+",50%,52%)"; b.appendChild(dot); }
    b.appendChild(document.createTextNode(text));
    b.onclick=function(){
      if (!name){ activeA={}; }
      else if (activeA[name]){ delete activeA[name]; }
      else { activeA[name]=true; }
      saveSel(); syncChips(); applyHighlight();
    };
    return b;
  }
  function syncChips(){
    var chips=chipsEl.querySelectorAll(".chip"), act=selList(), none=act.length===0;
    for (var i=0;i<chips.length;i++){
      var nm=chips[i].dataset.name, on = nm ? !!activeA[nm] : none;
      chips[i].classList.toggle("on", on);
      if (nm && on){ var c = window.__hlColorFor(act, nm);
        chips[i].style.background = c; chips[i].style.borderColor = c; chips[i].style.color = "#fff"; }
      else { chips[i].style.background = ""; chips[i].style.borderColor = ""; chips[i].style.color = ""; }
    }
  }

  // ---- render table ----
  function hue(s){ var h=0,str=s||""; for (var i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))>>>0; } return h%360; }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function badges(names, free){
    if (!names.length) return '<span class="dash">·</span>';
    var out="";
    for (var i=0;i<names.length;i++){
      var t=names[i];
      out += '<span class="nm'+(free?" free":"")+'" data-nm="'+esc(t)+'" style="--h:'+hue(t)+'">'+esc(t)+'</span>';
    }
    return out;
  }

  // vertical-line + dim-晚 class for a session column (s: 0早 1中 2晚)
  function colCls(s){ var c=["sc"]; if (s===0) c.push("gsep"); if (s===2) c.push("late"); return ' class="'+c.join(" ")+'"'; }

  function render(){
    if (!weekList.length){ scrollEl.innerHTML='<div class="status">母表沒有可解析的資料。</div>'; return; }
    if (curWeek==null) curWeek=weekList[0];

    var SITEW=88, SESSW=116, LATEW=48;
    var wide = window.innerWidth > 560;         // collapse 晚 on narrow screens
    lastWide = wide;
    var sess = wide ? [0,1,2] : [0,1];          // shown sessions (早/中[/晚])
    var span = sess.length;
    var wOf = function(s){ return s===2 ? LATEW : SESSW; };

    // colgroup (site col + per-weekday session cols) → deterministic widths
    var cols='<colgroup><col style="width:'+SITEW+'px">', totalW=SITEW;
    for (var d0=0; d0<6; d0++) for (var i0=0; i0<sess.length; i0++){
      var w=wOf(sess[i0]); cols += '<col style="width:'+w+'px">'; totalW += w;
    }
    cols += '</colgroup>';

    // header
    var grp='<tr class="grp"><th class="c-site" rowspan="2">院區＼日</th>';
    var sub='<tr class="sub">';
    for (var d=0; d<6; d++){
      var dt=slotDate(curWeek,d), we=(d===5)?" we":"";   // 週六
      grp += '<th class="wd gsep'+we+'" colspan="'+span+'">週'+WD[d]+'<small>'+md(dt)+'</small></th>';
      for (var i=0;i<sess.length;i++) sub += '<th'+colCls(sess[i])+'>'+SESS[sess[i]]+'</th>';
    }
    var h='<table class="avtbl" style="width:'+totalW+'px">'+cols+'<thead>'+grp+'</tr>'+sub+'</tr></thead><tbody>';

    // site rows
    for (var r=0;r<siteOrder.length;r++){
      var site=siteOrder[r], g=byWeek[curWeek] && byWeek[curWeek][site];
      h += '<tr class="siterow"><td class="c-site">'+esc(site)+'</td>';
      for (var d2=0; d2<6; d2++) for (var s2i=0; s2i<sess.length; s2i++){
        var s2=sess[s2i], arr = g ? g[d2][s2] : [];
        h += '<td'+colCls(s2)+'>'+badges(arr,false)+'</td>';
      }
      h += '</tr>';
    }

    // 有空 (per session) — leave doctors already excluded in freeAt
    h += '<tr class="freerow sep-top"><td class="c-site">有空</td>';
    for (var d3=0; d3<6; d3++){ var ac=availCount(curWeek,d3);
      for (var s3i=0; s3i<sess.length; s3i++){ var s3=sess[s3i];
        var fr=freeAt(curWeek,d3,s3);
        var cell = (fr.length===ac) ? '<span class="allfree">全部</span>' : badges(fr,true);
        h += '<td'+colCls(s3)+'>'+cell+'</td>';
      }
    }
    h += '</tr>';

    // 全天有空 (per day, merged across shown sessions)
    h += '<tr class="fulldayrow"><td class="c-site">全天有空</td>';
    for (var d4=0; d4<6; d4++){
      var fd=freeAllDay(curWeek,d4), ac2=availCount(curWeek,d4);
      var cell2 = (fd.length===ac2) ? '<span class="allfree">全部</span>' : badges(fd,true);
      h += '<td class="gsep fdcell" colspan="'+span+'">'+cell2+'</td>';
    }
    h += '</tr>';

    h += '</tbody></table>';
    scrollEl.innerHTML=h;
    applyHighlight();
  }

  // ---- highlight ----
  function applyHighlight(){
    var act=selList();
    var tbl=scrollEl.querySelector(".avtbl"); if (!tbl) return;
    tbl.classList.toggle("filtering", act.length>0);
    var spans=tbl.querySelectorAll(".nm");
    for (var i=0;i<spans.length;i++){
      var nm=spans[i].getAttribute("data-nm")||"", matched=null;
      for (var a=0;a<act.length;a++){ if (nm.indexOf(act[a])!==-1){ matched=act[a]; break; } }
      if (matched){ spans[i].classList.add("hit"); spans[i].style.background = window.__hlColorFor(act, matched); }
      else { spans[i].classList.remove("hit"); spans[i].style.background = ""; }
    }
  }

  // ---- export (normalised clean data) ----
  function buildExport(){
    var assignments=[], availability=[], fullday=[];
    for (var wi=0; wi<weekList.length; wi++){
      var wk=weekList[wi];
      for (var d=0; d<6; d++){
        var dt=slotDate(wk,d), diso=iso(dt);
        for (var s=0; s<3; s++){
          for (var si=0; si<siteOrder.length; si++){
            var site=siteOrder[si], g=byWeek[wk] && byWeek[wk][site];
            var arr=g ? g[d][s] : [];
            for (var k=0;k<arr.length;k++)
              assignments.push({month:isoMonth(),week:wk,weekday:d+1,date:diso,session:SESS[s],site:site,doctor:arr[k]});
          }
          availability.push({week:wk,weekday:d+1,date:diso,session:SESS[s],free:freeAt(wk,d,s)});
        }
        fullday.push({week:wk,weekday:d+1,date:diso,free:freeAllDay(wk,d)});
      }
    }
    return {month:isoMonth(), weekAnchor:"week-containing-1st (Mon–Sat)", roster:roster,
            sites:siteOrder, assignments:assignments, availability:availability, fullDayFree:fullday};
  }
  function isoMonth(){ function p(n){return (n<10?"0":"")+n;} return year+"-"+p(m0+1); }
  function dl(name, text, type){
    var blob=new Blob([text],{type:type+";charset=utf-8"});
    var url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download=name; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }
  el("avJson").onclick=function(){
    if (!loaded) return;
    dl("輪值母表_"+isoMonth()+".json", JSON.stringify(buildExport(),null,2), "application/json");
  };
  el("avCsv").onclick=function(){
    if (!loaded) return;
    var ex=buildExport(), lines=["month,week,weekday,date,session,site,doctor"];
    for (var i=0;i<ex.assignments.length;i++){
      var a=ex.assignments[i];
      lines.push([a.month,a.week,a.weekday,a.date,a.session,a.site,a.doctor].join(","));
    }
    dl("輪值班表_"+isoMonth()+".csv", "﻿"+lines.join("\n"), "text/csv");
  };

  function fmtClock(d){ function p(n){return (n<10?"0":"")+n;} return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes()); }
  function onError(msg){
    clearTimeout(loadTimer); loading=false;
    window.__hdPill.set("avail","err","載入失敗");
    chipsEl.hidden=true;
    scrollEl.innerHTML='<div class="status err"><div class="big">⚠ 無法載入母表</div><div>'+esc(msg)
      +'</div><div style="margin-top:14px"><button class="btn" id="avRetry">重試</button></div></div>';
    var rb=el("avRetry"); if (rb) rb.onclick=function(){ loaded=false; load(); };
  }
})();

// ===== view switcher ==============================================
(function(){
  window.__hdView = "date";
  var tabDate=document.getElementById("tabDate"), tabAvail=document.getElementById("tabAvail");
  function show(v){
    window.__hdView=v;
    document.getElementById("viewDate").hidden = (v!=="date");
    document.getElementById("viewAvail").hidden = (v!=="avail");
    tabDate.classList.toggle("on", v==="date"); tabDate.setAttribute("aria-selected", v==="date");
    tabAvail.classList.toggle("on", v==="avail"); tabAvail.setAttribute("aria-selected", v==="avail");
    window.__hdPill.show(v);
    if (v==="avail" && window.__availInit) window.__availInit();
  }
  tabDate.onclick=function(){ show("date"); };
  tabAvail.onclick=function(){ show("avail"); };
  // header ↻ refreshes whichever view is active
  document.getElementById("refreshBtn").onclick=function(){
    var f=window.__hdPill.refresh[window.__hdView]; if (f) f();
  };
})();
</script>
</body>
</html>
